version: '3.8'

services:
  # 後端 API 服務
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copilot-lab-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # 前端服務（使用 nginx 提供靜態檔案）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: copilot-lab-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
